<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0a0a" />
<title>로그인 — Tony × Hibae</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
body {
  background: #0a0a0a;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,91,138,0.10), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(94,196,214,0.06), transparent 55%);
  color: #e8e4dc;
  font-family: 'Inter', -apple-system, sans-serif;
  display: flex;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.box {
  max-width: 380px;
  width: 100%;
  padding: 40px 28px 32px;
  background: #141414;
  border: 1px solid #262626;
  border-radius: 14px;
  text-align: center;
}
.brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #888;
  letter-spacing: 0.22em;
  margin-bottom: 18px;
}
.brand .pulse {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #ff5b8a;
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,91,138,0.4) }
  50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(255,91,138,0) }
}
h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em }
.heart { color: #ff5b8a; font-weight: 400; margin: 0 6px }
.sub { color: #888; font-size: 13px; margin-bottom: 28px }
input {
  width: 100%;
  padding: 13px 14px;
  background: #0a0a0a;
  border: 1px solid #262626;
  color: #e8e4dc;
  border-radius: 8px;
  font-family: inherit;
  font-size: 15px;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.15s;
}
input:focus { border-color: #5ec4d6 }
button {
  width: 100%;
  padding: 13px;
  background: #ff5b8a;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.88 }
.err {
  color: #e04848;
  font-size: 12px;
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  min-height: 16px;
}
.foot {
  margin-top: 24px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: #555;
  letter-spacing: 0.15em;
}
</style>
</head>
<body>
<form class="box" action="/api/login" method="POST" autocomplete="on">
  <div class="brand"><span class="pulse"></span>SYS::TARA / AUTH</div>
  <h1>TONY <span class="heart">♥</span> HIBAE</h1>
  <div class="sub">트립 사이트 — 비밀번호 입력</div>
  <input type="password" name="password" placeholder="비밀번호" required autofocus autocomplete="current-password" />
  <button type="submit">들어가기</button>
  <div class="err" id="err"></div>
  <div class="foot">PROTECTED ZONE</div>
</form>
<script>
  var p = new URLSearchParams(location.search);
  if (p.get('err')) document.getElementById('err').textContent = '비밀번호가 틀려요';
</script>
</body>
</html>
