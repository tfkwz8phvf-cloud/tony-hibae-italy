<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<title>TONY × HIBAE — Italy 6/9-15</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --panel-2:#1a1a1a;
    --border:#262626;
    --text:#e8e4dc;
    --muted:#888;
    --dim:#555;
    --pink:#ff5b8a;
    --green:#5cb85c;
    --amber:#f0a35e;
    --cyan:#5ec4d6;
    --red:#e04848;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;background-image:radial-gradient(circle at 20% 0%,rgba(255,91,138,0.06),transparent 50%),radial-gradient(circle at 80% 100%,rgba(94,196,214,0.04),transparent 50%)}
  .mono{font-family:'JetBrains Mono',monospace}
  .container{max-width:880px;margin:0 auto;padding:24px 18px 80px}
  header{padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .brand{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.2em;margin-bottom:12px}
  .brand .pulse{display:inline-block;width:6px;height:6px;background:var(--pink);border-radius:50%;margin-right:8px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,91,138,0.4)}50%{opacity:0.6;box-shadow:0 0 0 8px rgba(255,91,138,0)}}
  h1{font-size:30px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px}
  h1 .heart{color:var(--pink);font-weight:400;margin:0 6px}
  .subtitle{color:var(--muted);font-size:14px}
  .countdown{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap}
  .cd-cell{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:64px;text-align:center}
  .cd-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text);line-height:1}
  .cd-label{font-size:10px;color:var(--dim);letter-spacing:0.15em;margin-top:6px;text-transform:uppercase}
  .tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1;min-width:fit-content;padding:10px 14px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 0.15s;white-space:nowrap}
  .tab.active{background:var(--panel-2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border)}
  .tab:hover:not(.active){color:var(--text)}
  .panel{display:none}
  .panel.active{display:block;animation:fade 0.2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .day{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .day-head{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;user-select:none}
  .day-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:0.15em;width:50px}
  .day-info{flex:1;min-width:0}
  .day-title{font-size:15px;font-weight:600;margin-bottom:2px}
  .day-sub{font-size:12px;color:var(--muted)}
  .day-toggle{color:var(--dim);transition:transform 0.2s;font-family:'JetBrains Mono',monospace}
  .day.open .day-toggle{transform:rotate(90deg)}
  .day-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
  .day.open .day-body{display:block}
  .schedule{margin-top:16px}
  .row{display:flex;gap:14px;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--border)}
  .row:last-child{border-bottom:none}
  .row-time{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px;width:64px;flex-shrink:0;font-weight:500}
  .row-text{flex:1;color:var(--text)}
  .row-text b{font-weight:600;color:var(--text)}
  .stay{margin-top:14px;padding:10px 12px;background:var(--panel-2);border-radius:8px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .stay .key{color:var(--pink)}
  .checklist{display:flex;flex-direction:column;gap:8px}
  .check{display:flex;align-items:center;gap:14px;padding:14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s}
  .check:hover{border-color:var(--dim)}
  .check.done{opacity:0.55}
  .checkbox{width:20px;height:20px;border:1.5px solid var(--dim);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .check.done .checkbox{background:var(--green);border-color:var(--green)}
  .check.done .checkbox::after{content:'✓';color:#000;font-weight:700;font-size:13px}
  .check-info{flex:1;min-width:0}
  .check-title{font-size:14px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .check.done .check-title-text{text-decoration:line-through;color:var(--muted)}
  .check-meta{font-size:12px;color:var(--muted)}
  .check-cost{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);font-weight:600}
  .pri{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;padding:3px 6px;border-radius:4px}
  .pri-now{background:rgba(224,72,72,0.18);color:var(--red)}
  .pri-week{background:rgba(240,163,94,0.15);color:var(--amber)}
  .pri-later{background:rgba(94,196,214,0.12);color:var(--cyan)}
  .budget-card{background:linear-gradient(135deg,var(--panel) 0%,var(--panel-2) 100%);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
  .b-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .b-label{color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;text-transform:uppercase}
  .b-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600}
  .b-val.big{font-size:28px;color:var(--pink)}
  .b-val.green{color:var(--green)}
  .b-val.amber{color:var(--amber)}
  .progress{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:12px}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--amber));transition:width 0.3s;border-radius:99px}
  .progress-fill.over{background:var(--red)}
  .add-form{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:10px}
  .add-form input,.add-form select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-family:inherit;font-size:14px;outline:none;width:100%}
  .add-form input:focus,.add-form select:focus{border-color:var(--cyan)}
  .form-row{display:flex;gap:8px}
  .form-row > *{flex:1}
  .btn{background:var(--pink);color:#fff;border:none;padding:11px 16px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
  .btn:hover{opacity:0.85}
  .expenses-list{margin-top:14px}
  .exp{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
  .exp-cat{font-size:18px;width:28px;text-align:center}
  .exp-info{flex:1;min-width:0}
  .exp-title{font-size:14px;font-weight:500;word-break:break-word}
  .exp-meta{font-size:11px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
  .exp-amt{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--amber)}
  .exp-del{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:4px 8px}
  .exp-del:hover{color:var(--red)}
  .empty{text-align:center;color:var(--muted);padding:32px;font-size:13px}
  .cat-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:14px}
  .cat-cell{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
  .cat-cell-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.05em}
  .cat-cell-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;margin-top:4px}
  .info-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
  .info-card h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:8px}
  .info-card h3 .ico{font-size:16px}
  .info-row{display:flex;gap:12px;padding:7px 0;font-size:13px}
  .info-row .k{color:var(--muted);width:90px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:12px}
  .info-row .v{flex:1;color:var(--text);word-break:break-word}
  .spot{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
  .spot-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
  .spot-name{font-weight:600;font-size:14px}
  .spot-tag{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;padding:3px 7px;border-radius:4px;background:var(--panel-2);color:var(--muted);flex-shrink:0;text-transform:uppercase}
  .spot-tag.must{background:rgba(255,91,138,0.18);color:var(--pink)}
  .spot-desc{font-size:12px;color:var(--muted);line-height:1.5}
  .city-h{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .city-h:first-child{margin-top:0}
  .doc-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
  .doc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .doc-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
  .doc-name .doc-ico{font-size:18px}
  .doc-status{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em;padding:3px 8px;border-radius:4px;flex-shrink:0;text-transform:uppercase;font-weight:600}
  .doc-status.confirmed{background:rgba(92,184,92,0.18);color:var(--green)}
  .doc-status.pending{background:rgba(240,163,94,0.18);color:var(--amber)}
  .doc-status.candidate{background:rgba(94,196,214,0.15);color:var(--cyan)}
  .doc-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .doc-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .doc-btn{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:12px;text-decoration:none;transition:all 0.15s;font-weight:500}
  .doc-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .doc-btn .ico{font-size:13px}
  .doc-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber);background:var(--panel-2);padding:5px 10px;border-radius:4px;display:inline-block;margin-top:4px;letter-spacing:0.05em}
  .doc-warn{font-size:11px;color:var(--muted);background:rgba(240,163,94,0.08);border-left:2px solid var(--amber);padding:8px 10px;margin-top:10px;border-radius:0 4px 4px 0;line-height:1.5}
  footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--dim);font-size:11px;font-family:'JetBrains Mono',monospace;letter-spacing:0.1em}
  footer .heart{color:var(--pink)}
  @media (max-width:560px){
    h1{font-size:24px}
    .container{padding:16px 14px 60px}
    .tab{font-size:12px;padding:9px 11px}
    .row-time{width:54px}
    .info-row .k{width:72px}
  }
</style>
</head>

<header>

<section class="panel" data-panel="info" id="info-panel"></section>
<section class="panel" data-panel="spots" id="spots-panel"></section>

<footer>CRAFTED BY TARA <span class="heart">♥</span> FOR TONY × HIBAE</footer>

</div>

// ============= SAFE DOM HELPERS (no innerHTML for user/dynamic data) =============
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function el(tag, opts){
  const e = document.createElement(tag);
  if(!opts) return e;
  if(opts.cls) e.className = opts.cls;
  if(opts.text != null) e.textContent = String(opts.text);
  if(opts.attrs) for(const k in opts.attrs) e.setAttribute(k, opts.attrs[k]);
  if(opts.children) opts.children.forEach(c => c && e.appendChild(c));
  return e;
}

// ============= ITINERARY =============
function renderItinerary(){
  const root = $('#itinerary');
  root.replaceChildren();
  TRIP.days.forEach((d, i) => {
    const day = el('div', {cls:'day' + (i===0?' open':''), attrs:{'data-day':i}});
    const head = el('div', {cls:'day-head', children:[
      el('div', {cls:'day-num mono', text:'DAY ' + String(d.n).padStart(2,'0')}),
      el('div', {cls:'day-info', children:[
        el('div', {cls:'day-title', text:d.title}),
        el('div', {cls:'day-sub', text:d.date + ' · ' + d.sub})
      ]}),
      el('div', {cls:'day-toggle mono', text:'›'})
    ]});
    head.addEventListener('click', () => day.classList.toggle('open'));
    const sched = el('div', {cls:'schedule'});
    d.schedule.forEach(([t, txt, bold]) => {
      const txtEl = el('div', {cls:'row-text'});
      if(bold){
        const b = el('b', {text:txt});
        txtEl.appendChild(b);
      } else {
        txtEl.textContent = txt;
      }
      sched.appendChild(el('div', {cls:'row', children:[
        el('div', {cls:'row-time', text:t}),
        txtEl
      ]}));
    });
    const stay = el('div', {cls:'stay', children:[
      el('span', {cls:'key', text:'STAY'})
    ]});
    stay.appendChild(document.createTextNode(' · ' + d.stay));
    const body = el('div', {cls:'day-body', children:[sched, stay]});
    day.append(head, body);
    root.appendChild(day);
  });
}

// ============= BOOKINGS =============
function renderBookings(){
  const saved = JSON.parse(localStorage.getItem('bookings') || '{}');
  const root = $('#checklist');
  root.replaceChildren();
  TRIP.bookings.forEach(b => {
    const done = saved[b.id] !== undefined ? saved[b.id] : b.done;
    const priLabel = {now:'NOW', week:'WEEK', later:'LATER'}[b.priority];
    const titleEl = el('div', {cls:'check-title', children:[
      el('span', {cls:'check-title-text', text:b.title}),
      el('span', {cls:'pri pri-' + b.priority, text:priLabel})
    ]});
    const children = [
      el('div', {cls:'checkbox'}),
      el('div', {cls:'check-info', children:[
        titleEl,
        el('div', {cls:'check-meta', text:b.meta})
      ]})
    ];
    if(b.cost) children.push(el('div', {cls:'check-cost', text:'€' + b.cost}));
    const row = el('div', {cls:'check' + (done?' done':''), attrs:{'data-id':b.id}, children});
    row.addEventListener('click', () => {
      const cur = JSON.parse(localStorage.getItem('bookings') || '{}');
      cur[b.id] = !row.classList.contains('done');
      localStorage.setItem('bookings', JSON.stringify(cur));
      row.classList.toggle('done');
    });
    root.appendChild(row);
  });
}

function renderDocs(){
  const root = $('#docs-panel');
  root.replaceChildren();
  const intro = el('div', {cls:'doc-warn', text:'⚠️ 이 사이트 URL은 둘만 알고 있어요. 다른 사람한테 공유 금지. 결제·신상 정보 노출됨.'});
  intro.style.marginBottom = '14px';
  root.appendChild(intro);
  const statusLabel = {confirmed:'예약 완료', pending:'대기', candidate:'후보'};
  TRIP.docs.forEach(d => {
    const card = el('div', {cls:'doc-card'});
    card.appendChild(el('div', {cls:'doc-head', children:[
      el('div', {cls:'doc-name', children:[
        el('span', {cls:'doc-ico', text:d.ico}),
        document.createTextNode(d.name)
      ]}),
      el('div', {cls:'doc-status ' + d.status, text:statusLabel[d.status] || d.status})
    ]}));
    card.appendChild(el('div', {cls:'doc-meta', text:d.meta}));
    if(d.codes && d.codes.length){
      const codeWrap = el('div');
      d.codes.forEach(c => {
        const codeEl = el('div', {cls:'doc-code'});
        codeEl.appendChild(document.createTextNode(c.label + ': '));
        const v = el('span', {text:c.value});
        v.style.color = 'var(--text)';
        v.style.fontWeight = '700';
        codeEl.appendChild(v);
        codeWrap.appendChild(codeEl);
        codeWrap.appendChild(document.createTextNode(' '));
      });
      card.appendChild(codeWrap);
    }
    if((d.links && d.links.length) || (d.pdfs && d.pdfs.length)){
      const actions = el('div', {cls:'doc-actions'});
      (d.links || []).forEach(link => {
        const a = el('a', {cls:'doc-btn', attrs:{href:link.url, target:'_blank', rel:'noopener noreferrer'}, children:[
          el('span', {cls:'ico', text:'↗'}),
          document.createTextNode(link.label)
        ]});
        actions.appendChild(a);
      });
      (d.pdfs || []).forEach(pdf => {
        const a = el('a', {cls:'doc-btn', attrs:{href:pdf.url, download:'', target:'_blank', rel:'noopener'}, children:[
          el('span', {cls:'ico', text:'📄'}),
          document.createTextNode(pdf.label)
        ]});
        actions.appendChild(a);
      });
      card.appendChild(actions);
    }
    if(d.note){
      card.appendChild(el('div', {cls:'doc-warn', text:d.note}));
    }
    root.appendChild(card);
  });
}

// ============= EXPENSES =============
function getExpenses(){ return JSON.parse(localStorage.getItem('expenses') || '[]'); }
function saveExpenses(arr){ localStorage.setItem('expenses', JSON.stringify(arr)); }

function renderExpenses(){
  const exp = getExpenses();
  const total = exp.reduce((s, e) => s + e.amt, 0);
  const left = TRIP.budget - total;
  const pct = Math.min(100, (total / TRIP.budget) * 100);
  $('#budget-spent').textContent = '€' + total.toFixed(2);
  $('#budget-left').textContent = '€' + left.toFixed(2);
  $('#budget-left').className = 'b-val big ' + (left < 0 ? 'amber' : 'green');
  $('#progress-fill').style.width = pct + '%';
  $('#progress-fill').className = 'progress-fill' + (left < 0 ? ' over' : '');

  const byCat = {};
  exp.forEach(e => byCat[e.cat] = (byCat[e.cat] || 0) + e.amt);
  const catLabels = {'🍝':'식비','🚆':'교통','🏨':'숙박','🎫':'액티비티','🛍':'쇼핑','☕':'카페','📦':'기타'};
  const catRoot = $('#cat-summary');
  catRoot.replaceChildren();
  Object.entries(byCat).forEach(([cat, amt]) => {
    catRoot.appendChild(el('div', {cls:'cat-cell', children:[
      el('div', {cls:'cat-cell-label', text:cat + ' ' + (catLabels[cat] || '')}),
      el('div', {cls:'cat-cell-val', text:'€' + amt.toFixed(2)})
    ]}));
  });

  const list = $('#expenses-list');
  list.replaceChildren();
  if(exp.length === 0){
    list.appendChild(el('div', {cls:'empty', text:'아직 지출이 없어요. 트립 시작하면 입력해주세요!'}));
    return;
  }
  exp.slice().reverse().forEach((e, idx) => {
    const realIdx = exp.length - 1 - idx;
    const date = new Date(e.ts).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
    const delBtn = el('button', {cls:'exp-del', text:'×', attrs:{type:'button', 'aria-label':'삭제'}});
    delBtn.addEventListener('click', () => {
      const cur = getExpenses();
      cur.splice(realIdx, 1);
      saveExpenses(cur);
      renderExpenses();
    });
    list.appendChild(el('div', {cls:'exp', children:[
      el('div', {cls:'exp-cat', text:e.cat}),
      el('div', {cls:'exp-info', children:[
        el('div', {cls:'exp-title', text:e.title}),
        el('div', {cls:'exp-meta', text:date})
      ]}),
      el('div', {cls:'exp-amt', text:'€' + e.amt.toFixed(2)}),
      delBtn
    ]}));
  });
}

$('#exp-form').addEventListener('submit', e => {
  e.preventDefault();
  const title = $('#exp-title').value.trim();
  const amt = parseFloat($('#exp-amt').value);
  const cat = $('#exp-cat').value;
  if(!title || isNaN(amt) || amt < 0) return;
  const exp = getExpenses();
  exp.push({title:title.slice(0, 80), amt, cat, ts: Date.now()});
  saveExpenses(exp);
  $('#exp-title').value = '';
  $('#exp-amt').value = '';
  renderExpenses();
});

// ============= TABS =============
$$('.tab').forEach(t => t.addEventListener('click', () => {
  $$('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  const panel = t.dataset.tab;
  $$('.panel').forEach(p => p.classList.remove('active'));
  $('[data-panel="' + panel + '"]').classList.add('active');
}));

// ============= COUNTDOWN =============
function tick(){
  const target = new Date(TRIP.start).getTime();
  const diff = target - Date.now();
  if(diff <= 0){
    const cd = $('#countdown');
    cd.replaceChildren();
    const cell = el('div', {cls:'cd-cell', attrs:{style:'flex:1'}, children:[
      el('div', {cls:'cd-num', text:'TRIP IS LIVE', attrs:{style:'color:var(--pink);font-size:16px'}}),
      el('div', {cls:'cd-label', text:'enjoy ♥'})
    ]});
    cd.appendChild(cell);
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  $('#cd-d').textContent = String(d).padStart(2, '0');
  $('#cd-h').textContent = String(h).padStart(2, '0');
  $('#cd-m').textContent = String(m).padStart(2, '0');
  $('#cd-s').textContent = String(s).padStart(2, '0');
}

renderItinerary();
renderBookings();
renderInfo();
renderSpots();
renderDocs();
renderExpenses();
tick();
setInterval(tick, 1000);
</script>
